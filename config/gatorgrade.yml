# Reflection (combined writeup for all parts)
- writing/reflection.md:
    - description: Ensure reflection exists
      check: ConfirmFileExists
    - description: Reflection has at least 800 words
      check: CountFileWords
      options:
        count: 800
        exact: false
    - description: Reflection includes student name
      check: MatchFileFragment
      options:
        fragment: "Name:"
        count: 1
        exact: false
    - description: Reflection includes all 11 question answers
      check: MatchFileFragment
      options:
        fragment: "**Answer:**"
        count: 11
        exact: false
    - description: Reflection includes waypoint table
      check: MatchFileFragment
      options:
        fragment: "| Waypoint |"
        count: 1
        exact: false
    - description: Reflection includes TurtleBot ID
      check: MatchFileFragment
      options:
        fragment: "TurtleBot ID used:"
        count: 1
        exact: false
    - description: Reflection includes time log
      check: MatchFileFragment
      options:
        fragment: "**Total**"
        count: 1
        exact: false

# Navigation node
- src/navigate_waypoints.py:
    - description: Ensure waypoint navigation node exists
      check: ConfirmFileExists
    - description: Python node has at least 40 lines
      check: CountFileParagraphs
      options:
        count: 40
        exact: false
    - description: Node imports rclpy
      check: MatchFileFragment
      options:
        fragment: "import rclpy"
        count: 1
        exact: false
    - description: Node uses NavigateToPose action
      check: MatchFileFragment
      options:
        fragment: "NavigateToPose"
        count: 1
        exact: false
    - description: Node defines waypoints
      check: MatchFileFragment
      options:
        fragment: "waypoints"
        count: 1
        exact: false

# Map files
- maps/sim_map.yaml:
    - description: Ensure simulation map metadata exists
      check: ConfirmFileExists

- maps/real_map.yaml:
    - description: Ensure physical map metadata exists
      check: ConfirmFileExists

# Commits
- description: Repository has at least 5 commits
  check: CountCommits
  options:
    count: 5
